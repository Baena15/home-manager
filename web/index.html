<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#B4D89E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Home Manager">
  <title>Home Manager</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>Home Manager</h1>
      <button id="logout-btn" class="logout-btn" hidden>Salir</button>
    </header>
    <main id="main" class="container">
      <!-- Views are rendered here -->
    </main>
    <nav id="nav" class="bottom-nav" hidden>
      <button data-view="lists" class="nav-btn active">📝 Listas</button>
      <button data-view="products" class="nav-btn">🛒 Productos</button>
      <button data-view="expenses" class="nav-btn">💸 Gastos</button>
      <button data-view="incomes" class="nav-btn">💰 Ingresos</button>
      <button data-view="settlements" class="nav-btn">💳 Pagos</button>
      <button data-view="dashboard" class="nav-btn">📊 Dashboard</button>
    </nav>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(console.error);
    }
  </script>
</body>
</html>

# CI/CD Pipeline - Gentleman Stack
# Tests + Lint + Deploy automático a Railway

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Install Dependencies
        run: go mod download

      - name: Run Linter
        run: go vet ./...

      - name: Run Tests
        run: go test -v -race ./...
        env:
          DATABASE_URL: postgres://test:test@localhost:5433/testdb?sslmode=disable
          JWT_SECRET: test-secret-key-32-characters-long
          OWNER_PASSWORD: test-owner-password
          PARTNER_PASSWORD: test-partner-password

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Check Railway config
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "❌ RAILWAY_TOKEN secret is not configured"
            exit 1
          fi
          if [ -z "${{ secrets.RAILWAY_SERVICE }}" ]; then
            echo "❌ RAILWAY_SERVICE secret is not configured"
            exit 1
          fi

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service "${{ secrets.RAILWAY_SERVICE }}"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Notify Success
        run: echo "✅ Deploy completado"
